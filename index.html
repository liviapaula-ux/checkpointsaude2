<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkpoint Saúde Gestante 2 - Ifamily • iDoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1f2328;
        }

        .gh-card {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            overflow: hidden;
        }

        .gh-input {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1f2328;
        }

        .gh-input:focus {
            border-color: #dc2626;
            outline: none;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
            background-color: #ffffff;
        }

        .btn-primary {
            background-color: #dc2626;
            color: white;
            font-weight: 600;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background-color: #b91c1c;
        }

        .section-title {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 8px;
            margin-bottom: 16px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #57606a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4">

<div class="max-w-3xl mx-auto">

<form
action="https://script.google.com/macros/s/AKfycbxvxy_2MAv7OV3xf4Yzd41upilhkKdzKJPER6_6kuVlXQIkoKx1X4yiruzcmLNPNggGng/exec"
method="GET"
target="_blank"
class="gh-card shadow-sm">

<div class="p-8 space-y-10">

<section>
<h3 class="section-title">Identificação</h3>

<div class="grid grid-cols-1 md:grid-cols-2 gap-5">

<div>
<label>Nome Completo</label>
<input name="nome" type="text" required class="gh-input w-full p-2.5 text-sm">
</div>

<div>
<label>E-mail iFood</label>
<input name="email_ifood" type="email" required class="gh-input w-full p-2.5 text-sm">
</div>

<div class="md:col-span-2">
<label>Peso e Altura</label>
<input name="peso_altura" type="text" class="gh-input w-full p-2.5 text-sm">
</div>

</div>
</section>

<section>
<h3 class="section-title">Saúde na Gestação</h3>

<textarea name="doenca_gestacao" class="gh-input w-full p-2.5 text-sm mb-4" placeholder="Desenvolveu alguma doença na gestação?"></textarea>

<textarea name="remedio" class="gh-input w-full p-2.5 text-sm" placeholder="Uso de remédio contínuo"></textarea>
</section>

<section>
<h3 class="section-title">Exames</h3>

<textarea name="ultrassom" class="gh-input w-full p-2.5 text-sm mb-4"></textarea>

<textarea name="exames" class="gh-input w-full p-2.5 text-sm mb-4"></textarea>

<textarea name="outros_exames" class="gh-input w-full p-2.5 text-sm"></textarea>
</section>

<section>
<h3 class="section-title">Bem-estar</h3>

<input name="emocional" class="gh-input w-full p-2.5 text-sm mb-4">

<input name="vacinas" class="gh-input w-full p-2.5 text-sm mb-4">

<input name="posicao_fetal" class="gh-input w-full p-2.5 text-sm mb-4">

<input name="tipo_parto" class="gh-input w-full p-2.5 text-sm">
</section>

<section>
<h3 class="section-title">Ocorrências</h3>

<textarea name="atividade" class="gh-input w-full p-2.5 text-sm mb-4"></textarea>

<input name="internacao" class="gh-input w-full p-2.5 text-sm mb-4">

<input name="sangramento" class="gh-input w-full p-2.5 text-sm mb-4">

<input name="maternidade" class="gh-input w-full p-2.5 text-sm">
</section>

<button type="submit" class="btn-primary py-3 px-10 text-sm">
Enviar Dados
</button>

</div>
</form>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
